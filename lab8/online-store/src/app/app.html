<!-- toolbar lives outside the grid so it never shifts -->
<div class="view-switch">
  <button
    type="button"
    (click)="openMain()"
    [disabled]="!showFavoritesPage"
    [class.active]="!showFavoritesPage"
  >
    All products
  </button>
  <button
    type="button"
    (click)="openFavorites()"
    [disabled]="showFavoritesPage"
    [class.active]="showFavoritesPage"
  >
    ⭐ Favorites ({{ favorites.length }})
  </button>
</div>

<main class="main" [class.single]="showFavoritesPage">

  <!-- main listing view -->
  <ng-container *ngIf="!showFavoritesPage">
    <nav class="category-nav">
      <div class="category-list">
        <button
          class="category-button"
          *ngFor="let category of categories"
          type="button"
          (click)="onCategorySelect(category.id)"
          [class.active]="category.id === selectedCategoryId"
        >
          {{ category.name }}
        </button>
      </div>
    </nav>

    <section class="content">
      <p class="empty-state" *ngIf="selectedCategoryId === null">
        Select a category to see products.
      </p>

      <app-product-list
        *ngIf="selectedCategoryId !== null"
        [products]="filteredProducts"
        (toggleFavorite)="toggleFavorite($event)"
        (deleteProduct)="deleteProduct($event)"
      ></app-product-list>
    </section>
  </ng-container>

  <!-- favorites page -->
  <ng-container *ngIf="showFavoritesPage">
    <section class="content">
      <p class="empty-state" *ngIf="favorites.length === 0">
        No favorite products yet
      </p>
      <div class="product-grid" *ngIf="favorites.length > 0">
        <app-product-item
          *ngFor="let product of favorites"
          [product]="product"
          (toggleFavorite)="toggleFavorite($event)"
          (deleteProduct)="deleteProduct($event)"
        ></app-product-item>
      </div>
    </section>
  </ng-container>
</main>


<router-outlet></router-outlet>
